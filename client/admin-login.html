<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Skills House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/vue@3.3.11/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
  <style>
    :root {
      --primary-bg: #010202;
      --card-bg: #151617;
      --mint-green: #A3F6D5;
      --sea-green: #5EA68D;
      --text-primary: #FFFFFF;
      --text-secondary: #C7D2D0;
      --text-muted: #AAABAB;
      --accent: #A3F6D5;
      --danger: #ff6b6b;
      --shadow-glow: rgba(163, 246, 213, 0.15);
      --gradient-accent: linear-gradient(135deg, #A3F6D5 0%, #5EA68D 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--primary-bg);
      color: var(--text-primary);
      overflow: hidden;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 网格背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(163, 246, 213, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(163, 246, 213, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
      pointer-events: none;
    }

    /* 发光效果 */
    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(163, 246, 213, 0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid rgba(163, 246, 213, 0.15);
      border-radius: 16px;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gradient-accent);
      opacity: 0.8;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 3rem;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px var(--shadow-glow));
      display: block;
      margin-bottom: 1rem;
    }

    .logo-text {
      font-family: 'Sora', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      margin-bottom: 0.6rem;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
      font-family: 'IBM Plex Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(163, 246, 213, 0.2);
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Sora', sans-serif;
      background: rgba(163, 246, 213, 0.05);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(163, 246, 213, 0.1);
      background: rgba(163, 246, 213, 0.08);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      padding: 1rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Sora', sans-serif;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background: var(--gradient-accent);
      color: var(--primary-bg);
      box-shadow: 0 0 20px var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(163, 246, 213, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(255, 107, 107, 0.1);
      border-left: 3px solid var(--danger);
      color: #ff9999;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .back-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      border-bottom-color: var(--accent);
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 2rem;
      }

      .logo-icon {
        font-size: 2.5rem;
      }

      .logo-text {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="login-container">
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">⚙</span>
        <div class="logo-text">ADMIN PANEL</div>
      </div>

      <h1 class="login-title">管理员登录</h1>
      <p class="login-subtitle">Skills House 后台管理系统</p>

      <div v-if="error" class="error-message">{{ error }}</div>

      <form @submit.prevent="handleLogin">
        <div class="form-group">
          <label class="form-label">用户名</label>
          <input 
            v-model="username" 
            type="text" 
            class="form-input" 
            placeholder="输入管理员用户名"
            required
            :disabled="loading"
            autofocus
          >
        </div>

        <div class="form-group">
          <label class="form-label">密码</label>
          <input 
            v-model="password" 
            type="password" 
            class="form-input" 
            placeholder="输入密码"
            required
            :disabled="loading"
          >
        </div>

        <button type="submit" class="btn btn-primary" :disabled="loading">
          {{ loading ? '登录中...' : '登录管理后台' }}
        </button>
      </form>

      <div class="back-link">
        <a href="/">返回主站</a>
      </div>
    </div>
  </div>

  <script>
    const { createApp } = Vue;

    createApp({
      data() {
        return {
          username: '',
          password: '',
          loading: false,
          error: ''
        };
      },
      async mounted() {
        // 如果已经有 token，直接跳转到管理后台
        const token = localStorage.getItem('skills_house_token');
        if (token) {
          axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;
          try {
            const res = await axios.get('/api/auth/me');
            if (res.data.user.role === 'admin') {
              window.location.href = '/admin.html';
              return;
            }
          } catch (error) {
            localStorage.removeItem('skills_house_token');
          }
        }
      },
      methods: {
        async handleLogin() {
          this.error = '';
          this.loading = true;

          try {
            const res = await axios.post('/api/auth/login', {
              username: this.username,
              password: this.password
            });

            const { token, user } = res.data;

            // 检查是否是管理员
            if (user.role !== 'admin') {
              this.error = '此账号不是管理员，无法访问后台';
              this.loading = false;
              return;
            }

            // 保存 token
            localStorage.setItem('skills_house_token', token);
            axios.defaults.headers.common['Authorization'] = `Bearer ${token}`;

            // 跳转到管理后台
            window.location.href = '/admin.html';
          } catch (error) {
            this.error = error.response?.data?.error || '登录失败，请检查用户名和密码';
          } finally {
            this.loading = false;
          }
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
